<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización de Flujo de Datos</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="dataFlowCanvas"></canvas>
</div>

<div class="controls">
    Transmisión de Datos Activa // Sistema en Red
</div>

<script>
    const canvas = document.getElementById('dataFlowCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let particles = [];
    let gridSize = 40;

    // Configuración de los dibujos
    const themeColor = '#00f2ff'; // Cyan tecnológico
    const secondaryColor = '#707070'; // Gris para rejilla

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }

    window.addEventListener('resize', resize);
    resize();

    class Packet {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = width * 0.15 + (Math.random() * 20); // Empieza en el PC
            this.y = height * 0.5 + (Math.random() * 40 - 20);
            this.speed = 2 + Math.random() * 3;
            this.size = Math.random() * 3 + 1;
            this.alpha = 0;
            this.targetX = width * 0.85; // Va hacia el servidor
            this.curve = (Math.random() - 0.5) * 150; // Curvatura aleatoria del cable
            this.life = 0;
        }

        update() {
            this.x += this.speed;
            this.life += 0.01;
            
            // Efecto de aparición/desaparición
            if (this.x < width * 0.2) this.alpha += 0.05;
            if (this.x > width * 0.8) this.alpha -= 0.05;

            // Movimiento ondulado
            this.currentY = height * 0.5 + Math.sin(this.x * 0.005) * this.curve;

            if (this.x >= this.targetX || this.alpha < 0) {
                this.reset();
            }
        }

        draw() {
            ctx.shadowBlur = 10;
            ctx.shadowColor = themeColor;
            ctx.fillStyle = `rgba(0, 242, 255, ${Math.max(0, this.alpha)})`;
            ctx.beginPath();
            ctx.arc(this.x, this.currentY, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    // Inicializar paquetes
    for(let i = 0; i < 60; i++) {
        particles.push(new Packet());
    }

    function drawGrid() {
        ctx.strokeStyle = 'rgba(112, 112, 112, 0.15)';
        ctx.lineWidth = 1;

        for (let x = 0; x <= width; x += gridSize) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, height);
            ctx.stroke();
        }

        for (let y = 0; y <= height; y += gridSize) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(width, y);
            ctx.stroke();
        }
    }

    function drawComputer(x, y) {
        ctx.strokeStyle = themeColor;
        ctx.lineWidth = 3;
        ctx.lineJoin = 'round';

        // Monitor
        ctx.strokeRect(x - 40, y - 50, 80, 50);
        // Pantalla interna
        ctx.strokeRect(x - 32, y - 43, 64, 36);
        // Soporte
        ctx.beginPath();
        ctx.moveTo(x - 10, y);
        ctx.lineTo(x + 10, y);
        ctx.moveTo(x, y);
        ctx.lineTo(x, y - 10);
        ctx.stroke();
        // Teclado
        ctx.strokeRect(x - 45, y + 5, 90, 8);
        
        ctx.fillStyle = 'rgba(0, 242, 255, 0.1)';
        ctx.fillRect(x - 32, y - 43, 64, 36);
    }

    function drawServer(x, y) {
        ctx.strokeStyle = themeColor;
        ctx.lineWidth = 3;

        // Cuerpo del servidor (Rack)
        for(let i = 0; i < 3; i++) {
            let offset = i * 35;
            ctx.strokeRect(x - 30, y - 60 + offset, 60, 25);
            
            // Luces indicadoras
            ctx.fillStyle = themeColor;
            ctx.beginPath();
            ctx.arc(x - 20, y - 48 + offset, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x - 10, y - 48 + offset, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function animate() {
        // Limpiar lienzo con un ligero rastro
        ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
        ctx.fillRect(0, 0, width, height);

        drawGrid();

        // Dibujar Conexiones (Cables invisibles/traslúcidos)
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
        ctx.lineWidth = 2;
        particles.forEach(p => {
           ctx.beginPath();
           ctx.moveTo(width * 0.15, height * 0.5);
           ctx.quadraticCurveTo(width * 0.5, height * 0.5 + p.curve * 2, width * 0.85, height * 0.5);
           ctx.stroke();
        });

        // Actualizar y dibujar paquetes de datos
        particles.forEach(p => {
            p.update();
            p.draw();
        });

        // Dibujar los iconos (encima de los paquetes para que no se vean debajo)
        drawComputer(width * 0.15, height * 0.5);
        drawServer(width * 0.85, height * 0.5);

        requestAnimationFrame(animate);
    }

    window.onload = animate;
</script>

</body>
</html>
