<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Logs - Sistema en Tiempo Real</title>
    <style>
        :root {
            --bg-color: #050505;
            --grid-color: rgba(112, 112, 112, 0.1);
            --terminal-bg: rgba(10, 10, 10, 0.95);
            --text-info: #00f2ff;
            --text-warn: #ffd700;
            --text-error: #ff4e50;
            --text-success: #deff9a;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Fondo de rejilla técnica */
        .background-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            from { transform: translate(0, 0); }
            to { transform: translate(-40px, -40px); }
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 40px;
            box-sizing: border-box;
        }

        /* Cabecera de estadísticas */
        .stats-header {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
            z-index: 10;
        }

        .stat-card {
            background: var(--terminal-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
        }

        /* Área de Terminal */
        .terminal-window {
            flex-grow: 1;
            background: var(--terminal-bg);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .terminal-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .terminal-dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .log-area {
            padding: 20px;
            overflow-y: hidden;
            display: flex;
            flex-direction: column-reverse;
            font-size: 14px;
            line-height: 1.6;
        }

        .log-line {
            display: flex;
            gap: 15px;
            margin-bottom: 4px;
            animation: fadeInLog 0.3s ease-out;
            white-space: pre-wrap;
        }

        @keyframes fadeInLog {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .timestamp { color: var(--text-dim); min-width: 160px; }
        .level { font-weight: bold; min-width: 80px; }
        .message { flex-grow: 1; }

        .lvl-info { color: var(--text-info); }
        .lvl-warn { color: var(--text-warn); }
        .lvl-error { color: var(--text-error); }
        .lvl-success { color: var(--text-success); }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--text-info);
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .footer-note {
            position: absolute;
            bottom: 15px;
            right: 20px;
            color: var(--text-dim);
            font-size: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="background-grid"></div>

<div class="container">
    <div class="stats-header">
        <div class="stat-card">
            <span id="stat-total" class="stat-value" style="color: var(--text-info);">0</span>
            <span class="stat-label">Logs Totales</span>
        </div>
        <div class="stat-card">
            <span id="stat-success" class="stat-value" style="color: var(--text-success);">0</span>
            <span class="stat-label">Éxitos (200 OK)</span>
        </div>
        <div class="stat-card">
            <span id="stat-warn" class="stat-value" style="color: var(--text-warn);">0</span>
            <span class="stat-label">Advertencias</span>
        </div>
        <div class="stat-card">
            <span id="stat-error" class="stat-value" style="color: var(--text-error);">0</span>
            <span class="stat-label">Errores Críticos</span>
        </div>
    </div>

    <div class="terminal-window">
        <div class="terminal-header">
            <div class="terminal-dots">
                <div class="dot" style="background: #ff5f56;"></div>
                <div class="dot" style="background: #ffbd2e;"></div>
                <div class="dot" style="background: #27c93f;"></div>
            </div>
            <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 1px;">SISTEMA_LOG_MONITOR - v2.5.0</div>
            <div id="status-indicator" style="color: var(--text-success); font-size: 10px;">● ONLINE</div>
        </div>
        
        <div id="log-container" class="log-area">
            <div class="log-line">
                <span class="message" style="color: var(--text-info);">Iniciando subsistema de monitorización... <span class="cursor"></span></span>
            </div>
        </div>

        <div class="footer-note">SISTEMA OPERATIVO: NODE_SERVER_X64 // LATENCIA: 14ms</div>
    </div>
</div>

<script>
    const logContainer = document.getElementById('log-container');
    const stats = {
        total: 0,
        success: 0,
        warn: 0,
        error: 0
    };

    const categories = ['RED', 'AUTH', 'DB', 'SYS', 'API', 'APP'];
    const messages = {
        INFO: [
            "Conexión entrante desde 192.168.1.{n}",
            "Sincronizando base de datos central...",
            "Escaneando puertos activos...",
            "Limpieza de caché completada satisfactoriamente.",
            "Nuevo usuario conectado a la sesión {id}.",
            "Verificando integridad de archivos del sistema."
        ],
        SUCCESS: [
            "Autenticación exitosa para el usuario {user}.",
            "Copia de seguridad almacenada en nube correctamente.",
            "Despliegue de versión v1.{n}.0 finalizado.",
            "Handshake TLS completado con éxito.",
            "Petición GET /api/v1/data procesada en {ms}ms."
        ],
        WARN: [
            "Latencia alta detectada en el nodo {n}.",
            "Intento de acceso fallido desde IP externa.",
            "Uso de memoria excediendo el 75%.",
            "Certificado SSL próximo a expirar en {n} días.",
            "Reintento de conexión con el microservicio {n}..."
        ],
        ERROR: [
            "¡Fallo crítico en el núcleo del sistema!",
            "Inyección SQL bloqueada en el endpoint {id}.",
            "Error de segmentación en el proceso 0x{ms}F.",
            "Base de datos no disponible: Tiempo de espera agotado.",
            "Violación de acceso en el sector de memoria {id}."
        ]
    };

    function getTimestamp() {
        const now = new Date();
        return now.toISOString().replace('T', ' ').substring(0, 19);
    }

    function createLogLine() {
        // Probabilidades de tipo de log
        const rand = Math.random();
        let type = "INFO";
        if (rand > 0.95) type = "ERROR";
        else if (rand > 0.85) type = "WARN";
        else if (rand > 0.65) type = "SUCCESS";

        const category = categories[Math.floor(Math.random() * categories.length)];
        let msgTemplate = messages[type][Math.floor(Math.random() * messages[type].length)];
        
        // Reemplazar placeholders por datos aleatorios
        const message = msgTemplate
            .replace('{n}', Math.floor(Math.random() * 255))
            .replace('{id}', Math.random().toString(36).substring(7).toUpperCase())
            .replace('{user}', ['admin', 'root', 'm_sanchez', 'guest_12'][Math.floor(Math.random() * 4)])
            .replace('{ms}', Math.floor(Math.random() * 500));

        const line = document.createElement('div');
        line.className = 'log-line';
        
        line.innerHTML = `
            <span class="timestamp">[${getTimestamp()}]</span>
            <span class="level lvl-${type.toLowerCase()}">${type}</span>
            <span class="message">[${category}] ${message}</span>
        `;

        // Añadir al contenedor
        logContainer.prepend(line);

        // Limitar número de líneas para rendimiento
        if (logContainer.childNodes.length > 50) {
            logContainer.removeChild(logContainer.lastChild);
        }

        // Actualizar estadísticas
        stats.total++;
        stats[type.toLowerCase()]++;
        updateStats();
    }

    function updateStats() {
        document.getElementById('stat-total').innerText = stats.total.toLocaleString();
        document.getElementById('stat-success').innerText = stats.success.toLocaleString();
        document.getElementById('stat-warn').innerText = stats.warn.toLocaleString();
        document.getElementById('stat-error').innerText = stats.error.toLocaleString();
    }

    // Generador aleatorio de intervalos
    function startLogging() {
        const interval = Math.random() * 1500 + 200;
        createLogLine();
        setTimeout(startLogging, interval);
    }

    // Efecto de parpadeo del indicador de estado
    setInterval(() => {
        const indicator = document.getElementById('status-indicator');
        indicator.style.opacity = indicator.style.opacity === '0' ? '1' : '0';
    }, 1000);

    // Iniciar
    window.onload = () => {
        setTimeout(startLogging, 1000);
    };
</script>

</body>
</html>
